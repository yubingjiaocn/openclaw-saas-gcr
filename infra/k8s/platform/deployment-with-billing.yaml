apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform-api
  namespace: openclaw-platform
  labels:
    app: platform-api
    app.kubernetes.io/part-of: openclaw-saas
spec:
  replicas: 1
  selector:
    matchLabels:
      app: platform-api
  template:
    metadata:
      labels:
        app: platform-api
    spec:
      serviceAccountName: platform-api
      containers:
        - name: api
          image: ${PLATFORM_IMAGE}
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - secretRef:
                name: platform-api-config
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          volumeMounts:
            - name: data
              mountPath: /app/data
        - name: billing-consumer
          image: ${BILLING_IMAGE}
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
          envFrom:
            - secretRef:
                name: platform-api-config
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          volumeMounts:
            - name: data
              mountPath: /app/data
      volumes:
        - name: data
          emptyDir: {}
