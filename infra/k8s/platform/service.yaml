apiVersion: v1
kind: Service
metadata:
  name: platform-api
  namespace: openclaw-platform
  labels:
    app: platform-api
  annotations:
    # AWS Load Balancer Controller v2.4+: "external" ensures the controller
    # manages this NLB (not the in-tree cloud provider). The legacy "nlb"
    # value may fall through to in-tree, losing SG/target-group management.
    service.beta.kubernetes.io/aws-load-balancer-type: "external"
    service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
    service.beta.kubernetes.io/aws-load-balancer-nlb-target-type: "ip"
    service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled: "true"
    # Health check
    service.beta.kubernetes.io/aws-load-balancer-healthcheck-path: "/health"
    service.beta.kubernetes.io/aws-load-balancer-healthcheck-protocol: "HTTP"
spec:
  type: LoadBalancer
  loadBalancerClass: service.k8s.aws/nlb
  selector:
    app: platform-api
  ports:
    - port: 80
      targetPort: 8000
      protocol: TCP
      name: http
