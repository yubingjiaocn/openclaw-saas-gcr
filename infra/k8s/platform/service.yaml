apiVersion: v1
kind: Service
metadata:
  name: platform-api
  namespace: openclaw-platform
  labels:
    app: platform-api
  annotations:
    # AWS Load Balancer Controller: provision NLB (internet-facing)
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
    service.beta.kubernetes.io/aws-load-balancer-nlb-target-type: "ip"
    # Security: restrict to CloudFront prefix list via CDK-managed SG
    service.beta.kubernetes.io/aws-load-balancer-security-groups: "${NLB_SECURITY_GROUP_ID}"
    # Health check
    service.beta.kubernetes.io/aws-load-balancer-healthcheck-path: "/health"
    service.beta.kubernetes.io/aws-load-balancer-healthcheck-protocol: "HTTP"
spec:
  type: LoadBalancer
  selector:
    app: platform-api
  ports:
    - port: 80
      targetPort: 8000
      protocol: TCP
      name: http
