# OpenClaw Platform Helm Chart Values

image:
  registry: "public.ecr.aws/bingjiao"
  pullPolicy: Always
  platform:
    repository: openclaw-saas-platform
    tag: "v0.9.61"
  billingConsumer:
    repository: openclaw-saas-billing-consumer
    tag: "v0.1.0"
  metricsExporter:
    repository: openclaw-saas-metrics-exporter
    tag: "v0.3.0"

# Database mode: sqlite or postgres
db:
  mode: sqlite          # sqlite (workshop) or postgres (production)
  # SQLite options (only used when mode=sqlite)
  sqlite:
    storageClass: ebs-sc
    size: 10Gi
  # Postgres (only used when mode=postgres)
  # url is read from secret.databaseUrl below

# Billing consumer sidecar
billing:
  enabled: true

# Networking
service:
  # NLB prefix list IDs (comma-separated). Empty = allow all.
  # Example: "pl-82a045eb" for CloudFront (us-west-2)
  nlbPrefixLists: ""

ingress:
  enabled: false        # true = ALB with custom domain
  certArn: ""
  host: ""

# Platform config (stored in Secret)
config:
  adminEmail: "admin@workshop.openclaw.dev"
  adminPassword: "Workshop2026!Admin"
  jwtSecret: ""         # auto-generated if empty
  logLevel: INFO
  availableChannels: ""
  defaultAgentImage: ""
  defaultAgentImageTag: latest
  sqsQueueUrl: ""
  awsRegion: ""         # auto-detected from node if empty
  awsPartition: aws
  awsAccountId: ""
  bedrockRoleArn: ""    # IRSA role ARN for tenant Bedrock access

resources:
  api:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  billing:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
