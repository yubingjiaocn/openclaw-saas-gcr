{{- if not .Values.ingress.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "openclaw-platform.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openclaw-platform.labels" . | nindent 4 }}
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "external"
    service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
    service.beta.kubernetes.io/aws-load-balancer-nlb-target-type: "ip"
    service.beta.kubernetes.io/aws-load-balancer-attributes: "load_balancing.cross_zone.enabled=true"
    service.beta.kubernetes.io/aws-load-balancer-healthcheck-path: "/health"
    service.beta.kubernetes.io/aws-load-balancer-healthcheck-protocol: "HTTP"
    {{- if .Values.service.nlbPrefixLists }}
    service.beta.kubernetes.io/aws-load-balancer-security-group-prefix-lists: {{ .Values.service.nlbPrefixLists | quote }}
    {{- end }}
spec:
  type: LoadBalancer
  loadBalancerClass: service.k8s.aws/nlb
  selector:
    {{- include "openclaw-platform.selectorLabels" . | nindent 4 }}
  ports:
    - port: 80
      targetPort: 8000
      protocol: TCP
      name: http
{{- end }}
