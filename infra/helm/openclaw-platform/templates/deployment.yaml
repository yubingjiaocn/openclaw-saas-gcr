apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "openclaw-platform.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openclaw-platform.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "openclaw-platform.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "openclaw-platform.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "openclaw-platform.serviceAccountName" . }}
      containers:
        - name: api
          image: {{ .Values.image.registry }}/{{ .Values.image.platform.repository }}:{{ .Values.image.platform.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - secretRef:
                name: {{ include "openclaw-platform.fullname" . }}
          resources: {{- toYaml .Values.resources.api | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          {{- if eq .Values.db.mode "sqlite" }}
          volumeMounts:
            - name: data
              mountPath: /data
          {{- end }}
        {{- if .Values.billing.enabled }}
        - name: billing-consumer
          image: {{ .Values.image.registry }}/{{ .Values.image.billingConsumer.repository }}:{{ .Values.image.billingConsumer.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
          envFrom:
            - secretRef:
                name: {{ include "openclaw-platform.fullname" . }}
          resources: {{- toYaml .Values.resources.billing | nindent 12 }}
          {{- if eq .Values.db.mode "sqlite" }}
          volumeMounts:
            - name: data
              mountPath: /data
          {{- end }}
        {{- end }}
      {{- if eq .Values.db.mode "sqlite" }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "openclaw-platform.fullname" . }}-data
      {{- end }}
