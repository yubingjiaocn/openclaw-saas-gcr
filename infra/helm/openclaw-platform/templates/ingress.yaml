{{- if .Values.ingress.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "openclaw-platform.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openclaw-platform.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "openclaw-platform.selectorLabels" . | nindent 4 }}
  ports:
    - port: 80
      targetPort: 8000
      protocol: TCP
      name: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "openclaw-platform.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openclaw-platform.labels" . | nindent 4 }}
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80},{"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    alb.ingress.kubernetes.io/certificate-arn: {{ required "ingress.certArn required" .Values.ingress.certArn | quote }}
    alb.ingress.kubernetes.io/healthcheck-path: /health
spec:
  ingressClassName: alb
  rules:
    - host: {{ required "ingress.host required" .Values.ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "openclaw-platform.fullname" . }}
                port:
                  number: 80
{{- end }}
