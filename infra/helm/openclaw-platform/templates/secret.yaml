apiVersion: v1
kind: Secret
metadata:
  name: {{ include "openclaw-platform.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openclaw-platform.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: {{ if eq .Values.db.mode "sqlite" }}"sqlite+aiosqlite:////data/platform.db"{{ else }}{{ required "config.databaseUrl is required when db.mode=postgres" .Values.config.databaseUrl | quote }}{{ end }}
  SQS_QUEUE_URL: {{ .Values.config.sqsQueueUrl | quote }}
  ECR_REGISTRY: {{ .Values.image.registry | quote }}
  ADMIN_EMAIL: {{ .Values.config.adminEmail | quote }}
  ADMIN_PASSWORD: {{ .Values.config.adminPassword | quote }}
  JWT_SECRET: {{ default (randAlphaNum 64) .Values.config.jwtSecret | quote }}
  K8S_IN_CLUSTER: "true"
  LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  AWS_REGION: {{ .Values.config.awsRegion | quote }}
  AWS_PARTITION: {{ .Values.config.awsPartition | quote }}
  AWS_ACCOUNT_ID: {{ .Values.config.awsAccountId | quote }}
  AVAILABLE_CHANNELS: {{ .Values.config.availableChannels | quote }}
  DEFAULT_AGENT_IMAGE: {{ .Values.config.defaultAgentImage | quote }}
  DEFAULT_AGENT_IMAGE_TAG: {{ .Values.config.defaultAgentImageTag | quote }}
  METRICS_EXPORTER_REPO: {{ .Values.image.metricsExporter.repository | quote }}
  METRICS_EXPORTER_TAG: {{ .Values.image.metricsExporter.tag | quote }}
  BEDROCK_ROLE_ARN: {{ .Values.config.bedrockRoleArn | quote }}
