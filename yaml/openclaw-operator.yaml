---
# Source: openclaw-operator/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw-operator
  labels:
    helm.sh/chart: openclaw-operator-0.20.0
    app.kubernetes.io/name: openclaw-operator
    app.kubernetes.io/instance: openclaw-operator
    app.kubernetes.io/version: "0.20.0"
    app.kubernetes.io/managed-by: Helm
    control-plane: controller-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: openclaw-operator
      app.kubernetes.io/instance: openclaw-operator
      control-plane: controller-manager
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
      labels:
        helm.sh/chart: openclaw-operator-0.20.0
        app.kubernetes.io/name: openclaw-operator
        app.kubernetes.io/instance: openclaw-operator
        app.kubernetes.io/version: "0.20.0"
        app.kubernetes.io/managed-by: Helm
        control-plane: controller-manager
    spec:
      serviceAccountName: openclaw-operator
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: manager
          image: "public.ecr.aws/i4x4j7g8/openclaw-saas/openclaw-operator:v0.20.0"
          imagePullPolicy: IfNotPresent
          command:
            - /manager
          args:
            - --leader-elect
            - --health-probe-bind-address=:8081
            - --metrics-bind-address=:8443
            - --metrics-secure=true
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
          ports:
            - name: health
              containerPort: 8081
              protocol: TCP
            - name: metrics
              containerPort: 8443
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              cpu: 500m
              memory: 256Mi
            requests:
              cpu: 100m
              memory: 128Mi
      terminationGracePeriodSeconds: 10
---
