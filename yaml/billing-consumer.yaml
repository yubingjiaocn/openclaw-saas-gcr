apiVersion: apps/v1
kind: Deployment
metadata:
  name: billing-consumer
  namespace: openclaw-platform
  labels:
    app.kubernetes.io/name: billing-consumer
    app.kubernetes.io/component: billing
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: billing-consumer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: billing-consumer
        app.kubernetes.io/component: billing
    spec:
      serviceAccountName: platform-api
      terminationGracePeriodSeconds: 30
      containers:
        - name: consumer
          image: ${BILLING_IMAGE}
          command: ["python", "consumer.py"]
          env:
            - name: SQS_QUEUE_URL
              valueFrom:
                secretKeyRef:
                  name: platform-config
                  key: SQS_QUEUE_URL
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: platform-db-secret
                  key: DATABASE_URL
            - name: AWS_DEFAULT_REGION
              valueFrom:
                secretKeyRef:
                  name: platform-config
                  key: AWS_REGION
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
        - name: aggregator
          image: ${BILLING_IMAGE}
          command: ["python", "aggregator.py"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: platform-db-secret
                  key: DATABASE_URL
            - name: AGGREGATION_INTERVAL
              value: "300"
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
